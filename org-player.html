<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chord Player</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0d0d0d;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100svh;
    background: #0d0d0d;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
    position: fixed;
    inset: 0;
  }

  /* CHORD GRID — isi seluruh layar */
  .chord-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
    overflow: hidden;
  }

  .chord-btn {
    border: none;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 8px;
    transition: filter 0.1s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }

  .chord-btn:active {
    filter: brightness(1.3);
    transform: scale(0.97);
  }

  .chord-key {
    font-size: clamp(48px, 12vw, 96px);
    font-weight: 800;
    color: #fff;
    line-height: 1;
    letter-spacing: -1px;
  }

  .chord-deg {
    font-size: clamp(13px, 3vw, 18px);
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Warna per chord */
  .c1 { background: #1a4a1a; }
  .c2 { background: #1a2a6a; }
  .c3 { background: #5a4400; }
  .c4 { background: #4a1a6a; }
</style>
</head>
<body>

<div class="chord-grid">
  <button class="chord-btn c1">
    <div class="chord-key">F</div>
    <div class="chord-deg">I</div>
  </button>
  <button class="chord-btn c2">
    <div class="chord-key">D#</div>
    <div class="chord-deg">VII</div>
  </button>
  <button class="chord-btn c3">
    <div class="chord-key">C#</div>
    <div class="chord-deg">VI</div>
  </button>
  <button class="chord-btn c4">
    <div class="chord-key">C</div>
    <div class="chord-deg">V</div>
  </button>
</div>

</body>
</html>
